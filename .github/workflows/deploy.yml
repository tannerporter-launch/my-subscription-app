name: Deploy to Vercel (production)

# Fully terminal-driven CD: every push to main builds and deploys to Vercel
# production. No Vercel↔GitHub app needed — auth is via VERCEL_TOKEN.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual re-runs (e.g. after setting the token)

# Avoid overlapping production deploys.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Verify build-time public env is present (no values printed)
        run: |
          if grep -qE '^NEXT_PUBLIC_SUPABASE_URL=("")?$' .vercel/.env.production.local; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL is empty in pulled env"; exit 1
          fi
          echo "NEXT_PUBLIC_SUPABASE_URL is set"

      - name: Build (production)
        # Force a clean build: NEXT_PUBLIC_* changes don't reliably invalidate
        # Vercel's build cache, which can re-inline a stale (empty) value.
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_FORCE_NO_BUILD_CACHE: "1"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
